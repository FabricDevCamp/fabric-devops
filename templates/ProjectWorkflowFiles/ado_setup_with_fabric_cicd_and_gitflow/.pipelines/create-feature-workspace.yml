name: 'Create_Feature_Workspace_$(Date:yyyyMMdd)'
appendCommitMessageToRunName: false

parameters:
- name: feature_name
  displayName: Feature Name
  type: string
  default: 'semantic_models'

trigger: none

variables: 
- group: 'environmental_variables'

jobs:
- job: Create_Feature_Workspace
  pool:
    vmImage: ubuntu-latest
  steps:
  - task: UsePythonVersion@0
    inputs:
      versionSpec: '3.12'
      addToPath: true

  - script: pip install microsoft-fabric-api -q
    displayName: 'Install Python SDK for Fabric REST APIs'
  
  - script: pip install fabric-cicd -q
    displayName: 'Install  fabric-cicd'

  - task: PythonScript@0  
    inputs:
      scriptSource: 'filePath'
      scriptPath: 'src/create_feature_workspace.py' 
      workingDirectory: '$(Build.SourcesDirectory)/src' # Optional: Specify the working directory for the script
      failOnStderr: true # Optional: Fail the task if any text is written to the stderr stream  
    env:
      AZURE_CLIENT_ID: $(AZURE_CLIENT_ID)
      AZURE_CLIENT_SECRET: $(AZURE_CLIENT_SECRET)
      AZURE_TENANT_ID: $(AZURE_TENANT_ID)
      SERVICE_PRINCIPAL_OBJECT_ID: $(SERVICE_PRINCIPAL_OBJECT_ID)
      AZURE_STORAGE_SAS_TOKEN: $(AZURE_STORAGE_SAS_TOKEN)
      ADMIN_USER_ID: $(ADMIN_USER_ID)
      DEVELOPERS_GROUP_ID: $(DEVELOPERS_GROUP_ID)
      FABRIC_CAPACITY_ID: $(FABRIC_CAPACITY_ID)
      WORKSPACE_ID_DEV: $(WORKSPACE_ID_DEV)
      WORKSPACE_ID_PROD: $(WORKSPACE_ID_PROD)
      FEATURE_NAME: ${{ parameters.feature_name }}
