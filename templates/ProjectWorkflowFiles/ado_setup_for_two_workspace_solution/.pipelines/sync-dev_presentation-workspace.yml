trigger:
  branches:
    include:
      - main
  paths:
    include:
      - workspace/presentation

variables: 
- group: 'environmental_variables'

jobs:
- job: Sync_dev_Presentation_Workspace
  pool:
    vmImage: ubuntu-latest
  
  steps:
  - task: UsePythonVersion@0
    inputs:
      versionSpec: '3.12'
      addToPath: true

  - script: pip install microsoft-fabric-api -q
    displayName: 'Install Python SDK for Fabric REST APIs'
  
  - script: pip install fabric-cicd -q
    displayName: 'Install  fabric-cicd'

  - task: PythonScript@0  
    inputs:
      scriptSource: 'filePath'
      scriptPath: 'src/sync_dev_presentation_workspace.py'
      workingDirectory: '$(Build.SourcesDirectory)/src'
      failOnStderr: true  
    env:
      AZURE_CLIENT_ID: $(AZURE_CLIENT_ID)
      AZURE_CLIENT_SECRET: $(AZURE_CLIENT_SECRET)
      AZURE_TENANT_ID: $(AZURE_TENANT_ID)
      SERVICE_PRINCIPAL_OBJECT_ID: $(SERVICE_PRINCIPAL_OBJECT_ID)
      AZURE_STORAGE_SAS_TOKEN: $(AZURE_STORAGE_SAS_TOKEN)
      ADMIN_USER_ID: $(ADMIN_USER_ID)
      FABRIC_CAPACITY_ID: $(FABRIC_CAPACITY_ID)
      WORKSPACE_ID_DEV_STAGING: $(WORKSPACE_ID_DEV_STAGING)
      WORKSPACE_ID_TEST_STAGING: $(WORKSPACE_ID_TEST_STAGING)
      WORKSPACE_ID_PROD_STAGING: $(WORKSPACE_ID_PROD_STAGING)
      WORKSPACE_ID_DEV_PRESENTATION: $(WORKSPACE_ID_DEV_PRESENTATION)
      WORKSPACE_ID_TEST_PRESENTATION: $(WORKSPACE_ID_TEST_PRESENTATION)
      WORKSPACE_ID_PROD_PRESENTATION: $(WORKSPACE_ID_PROD_PRESENTATION)
