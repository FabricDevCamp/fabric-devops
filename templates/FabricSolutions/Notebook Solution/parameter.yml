find_replace:
    # notebook substitution of workspace id for target lakehouse
    - find_value: \#\s*META\s+"default_lakehouse_workspace_id":\s*"([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12})"
      replace_value:
        _ALL_: "$workspace.$id"
      is_regex: "true"
      item_type: ["Notebook"]

    # notebook substitution of target lakehouse id
    - find_value: \#\s*META\s+"default_lakehouse":\s*"([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12})"
      replace_value:
        _ALL_: "$items.Lakehouse.sales.$id"
      is_regex: "true"
      item_type: ["Notebook"]

    # semantic model substitution of server for SQL Endpoint of lakehouse
    - find_value: 'Sql\.Database\(\s*"([^"]*datawarehouse\.fabric\.microsoft\.com[^"]*)"\s*,'
      replace_value:
        _ALL_: $items.Lakehouse.sales.$sqlendpoint
      is_regex: "true"
      item_type: ["SemanticModel"]
      file_path: "**/expressions.tmdl"



